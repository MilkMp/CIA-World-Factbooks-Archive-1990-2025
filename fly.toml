app = "cia-factbook-archive"
primary_region = "iad"

[build]

[env]
  DB_PATH = "/data/factbook.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "factbook_data"
  destination = "/data"
